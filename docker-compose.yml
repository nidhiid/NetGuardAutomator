services:
  postgres:
    image: postgres:16-alpine
    container_name: netguard-postgres
    environment:
      POSTGRES_DB: netguard
      POSTGRES_USER: netguard
      POSTGRES_PASSWORD: netguard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netguard -d netguard"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
